name: Build ProtractorPlus

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release
        run: cargo build --release

      - name: Upload executable
        uses: actions/upload-artifact@v6
        with:
          name: ProtractorPlus-windows-x64
          path: target/release/ProtractorPlus.exe
          if-no-files-found: error
